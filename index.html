<!DOCTYPE html>
<html>
<head>
    <title>Real-Time Chat</title>

    <style>
        body {
            background-color: #121212;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .chat-container {
            width: 400px;
            border: 2px solid #444;   /* 🔥 Border Added */
            border-radius: 12px;
            padding: 20px;
            background-color: #1e1e1e;
            box-shadow: 0 0 15px rgba(0,0,0,0.6);
        }

        h2 {
            text-align: center;
            margin-bottom: 15px;
        }

        #messages {
            list-style: none;
            padding: 10px;
            height: 200px;
            overflow-y: auto;
            border: 1px solid #333;   /* Border for message area */
            margin-bottom: 15px;
            background-color: #2a2a2a;
            border-radius: 8px;
        }

        #messages li {
            padding: 6px;
            margin-bottom: 5px;
            background-color: #333;
            border-radius: 6px;
        }

        input {
            width: 70%;
            padding: 8px;
            background-color: #2a2a2a;
            color: white;
            border: 1px solid #444;
            border-radius: 6px;
        }

        button {
            padding: 8px 12px;
            background-color: #2196f3;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background-color: #1976d2;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <h2>Real-Time Chat App</h2>

    <ul id="messages"></ul>

    <input id="input" autocomplete="off" />
    <button onclick="sendMessage()">Send</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();

    function sendMessage() {
        const input = document.getElementById("input");
        socket.emit("chat message", input.value);
        input.value = "";
    }

    socket.on("chat message", function(msg) {
        const li = document.createElement("li");
        li.textContent = msg;
        document.getElementById("messages").appendChild(li);
    });
</script>

</body>
</html>
